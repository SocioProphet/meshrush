name: Crystallization Fixtures

on:
  push:
    paths:
      - 'fixtures/graph-views/**'
      - 'tools/validate_crystallization_fixtures.py'
      - '.github/workflows/crystallization-fixtures.yml'
  pull_request:
    paths:
      - 'fixtures/graph-views/**'
      - 'tools/validate_crystallization_fixtures.py'
      - '.github/workflows/crystallization-fixtures.yml'

jobs:
  validate-crystallization-fixtures:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate MeshRush crystallization fixtures
        run: python3 tools/validate_crystallization_fixtures.py
